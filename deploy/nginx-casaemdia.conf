# Nginx: Casa em Dia (portas 8080 e 8443)
# Para não conflitar com outro serviço já usando 80/443 no Linux.
# Copiar para /etc/nginx/conf.d/casaemdia.conf
# Trocar seu-dominio.com.br pelo seu domínio.
# HTTPS: sudo certbot --nginx -d seu-dominio.com.br (use portas 8080/8443 no Certbot se necessário)

upstream casaemdia_frontend {
    server 127.0.0.1:8081;
    keepalive 32;
}

# Redirecionar HTTP (8080) para HTTPS (8443) — descomente após obter o certificado
# server {
#     listen 8080;
#     listen [::]:8080;
#     server_name seu-dominio.com.br;
#     return 301 https://$host:8443$request_uri;
# }

server {
    listen 8080;
    listen [::]:8080;
    server_name seu-dominio.com.br;

    # Para Certbot (validação HTTP-01) — acesse na porta 8080
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://casaemdia_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
    }
}

